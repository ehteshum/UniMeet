<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniMeet — Simple, Private Video Meetings</title>
  <meta name="description"
    content="Free browser-based video meetings. No sign-up required — just create or join a room.">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="home-wrapper">
    <!-- Decorative blobs -->
    <div class="blob blob--left"></div>
    <div class="blob blob--right"></div>

    <div class="home-content">
      <!-- Brand -->
      <div class="home-brand">
        <div class="home-brand__icon">
          <span class="material-symbols-outlined">video_chat</span>
        </div>
        <h1 class="home-brand__title">UniMeet</h1>
      </div>

      <!-- Subtitle -->
      <p class="home-subtitle">
        Simple, private video meetings for everyone. No installation required, just click and connect.
      </p>

      <!-- Username input -->
      <div class="home-username">
        <div class="home-username__input-wrap">
          <span class="material-symbols-outlined home-username__icon">person</span>
          <input type="text" class="home-username__input" id="username-input" placeholder="Your name" autocomplete="off"
            maxlength="24">
        </div>
      </div>

      <!-- Actions -->
      <div class="home-actions">
        <!-- New Meeting -->
        <div>
          <button class="btn-new-meeting" id="btn-new-meeting">
            <span class="material-symbols-outlined">video_call</span>
            <span>New Meeting</span>
          </button>
        </div>

        <!-- Join with code -->
        <div class="join-group">
          <div class="join-group__input-wrap">
            <span class="material-symbols-outlined join-group__icon">keyboard</span>
            <input type="text" class="join-group__input" id="join-input" placeholder="Enter a code or link"
              autocomplete="off">
          </div>
          <button class="btn-join" id="btn-join">Join</button>
        </div>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
